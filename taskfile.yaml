version: '3'

# Taskfile is the single operational interface for this repository.
#
# Task names follow the Ontopix "Taskfile as Contract" pattern:
#   https://docs.ontopix.dev/engineering/patterns/organizational/taskfile-contract
#
# Conventions:
#   - Segments are colon-separated: namespace:action[:target]
#   - Flat tasks are reserved for meta/utility (default, clean)
#   - Every task has a `desc:` and is idempotent where possible
#   - Environment comes from `.env` (see .env.example); shell env overrides it
#
# NOTE: this repo has no local (LocalStack) sandbox, so the standard `sandbox:*`
# namespace does not apply. AWS Amplify's *cloud* sandbox lives under `amplify:*`.

dotenv: ['.env']

vars:
  SAAS: '@starter-nuxt-amplify-saas/saas'
  LANDING: '@starter-nuxt-amplify-saas/landing'
  BACKEND: '@starter-nuxt-amplify-saas/backend'

tasks:
  default:
    desc: "List all available tasks"
    silent: true
    cmds:
      - task --list

  # ── setup: first-use setup ─────────────────────────────────────────────────

  setup:
    desc: "First-use setup: configure env and install dependencies"
    cmds:
      - task: setup:prepare
      - task: setup:install
      - echo ""
      - echo "Setup complete. Next steps:"
      - echo "  1. Review .env (AWS_PROFILE / SANDBOX_STACK_NAME / STRIPE_SECRET_KEY)"
      - echo "  2. task amplify:sandbox:init   — deploy the Amplify sandbox"
      - echo "  3. task dev:saas               — start the dashboard dev server"
      - echo "  4. task --list                 — see all available operations"

  setup:prepare:
    desc: "Copy .env.example to .env if missing"
    silent: true
    cmds:
      - |
        if [ ! -f .env ]; then
          cp .env.example .env
          echo "Created .env from .env.example — review and adjust values."
        else
          echo ".env already exists, skipping."
        fi

  setup:install:
    desc: "Install project dependencies (corepack + pnpm install)"
    cmds:
      - corepack enable
      - pnpm install

  setup:clean:
    desc: "Remove installed dependencies (node_modules)"
    cmds:
      - task: clean:node

  # ── dev: daily developer lifecycle ─────────────────────────────────────────

  dev:saas:
    desc: "Start the SaaS dashboard dev server"
    preconditions:
      - sh: 'test -f layers/amplify/amplify_outputs.json'
        msg: "amplify_outputs.json missing. Run: task amplify:sandbox:generate (or task amplify:outputs:stub for offline UI work)"
    cmds:
      - pnpm --filter {{.SAAS}} run dev

  dev:landing:
    desc: "Start the landing (marketing) dev server"
    preconditions:
      - sh: 'test -f layers/amplify/amplify_outputs.json'
        msg: "amplify_outputs.json missing. Run: task amplify:sandbox:generate (or task amplify:outputs:stub for offline UI work)"
    cmds:
      - pnpm --filter {{.LANDING}} run dev

  # ── lint: code quality ─────────────────────────────────────────────────────

  lint:check:
    desc: "Check code quality (ESLint) without modifying files"
    cmds:
      - pnpm exec eslint .

  lint:fix:
    desc: "Fix auto-fixable lint issues (ESLint)"
    cmds:
      - pnpm exec eslint . --fix

  lint:types:
    desc: "Type-check the SaaS app (nuxt typecheck)"
    deps: [amplify:outputs:stub]
    cmds:
      - pnpm --filter {{.SAAS}} run typecheck

  lint:all:
    desc: "Run all lint checks: ESLint + type-check"
    cmds:
      - task: lint:check
      - task: lint:types

  # ── test: testing ──────────────────────────────────────────────────────────

  test:unit:
    desc: "Run unit tests (Vitest)"
    cmds:
      - pnpm exec vitest run

  test:e2e:
    desc: "Run the SaaS Playwright e2e suite (requires a live Amplify sandbox)"
    cmds:
      - pnpm --filter {{.SAAS}} run test:e2e

  test:all:
    desc: "Run all tests runnable in CI (unit only; e2e needs a live sandbox)"
    cmds:
      - task: test:unit

  # ── ci: local mirror of the CI pipeline ────────────────────────────────────
  # Rule: if `task ci:all` passes locally, CI must pass.

  ci:lint:
    desc: "Run the same lint checks CI runs (lint:all)"
    cmds:
      - task: lint:all

  ci:test:
    desc: "Run the same tests CI runs (test:all)"
    cmds:
      - task: test:all

  ci:build:
    desc: "Run the same build CI runs (build:all)"
    cmds:
      - task: build:all

  ci:all:
    desc: "Run the full CI pipeline locally: lint + test + build"
    cmds:
      - task: ci:lint
      - task: ci:test
      - task: ci:build

  # ── build: build operations ────────────────────────────────────────────────

  build:saas:
    desc: "Build the SaaS dashboard (SSR) for production"
    deps: [amplify:outputs:stub]
    cmds:
      - pnpm --filter {{.SAAS}} run build

  build:landing:
    desc: "Generate the landing site (static)"
    deps: [amplify:outputs:stub]
    cmds:
      - pnpm --filter {{.LANDING}} run generate

  build:all:
    desc: "Build all applications (SaaS + landing)"
    cmds:
      - task: build:saas
      - task: build:landing

  # ── amplify: AWS Amplify Gen2 backend / cloud sandbox ──────────────────────

  amplify:checks:
    desc: "Verify Amplify sandbox prerequisites (AWS_PROFILE, SANDBOX_STACK_NAME)"
    silent: true
    preconditions:
      - sh: 'test -n "$AWS_PROFILE"'
        msg: "AWS_PROFILE is not set (add it to .env or export it)"
      - sh: 'test -n "$SANDBOX_STACK_NAME"'
        msg: "SANDBOX_STACK_NAME is not set (add it to .env or export it)"

  amplify:outputs:stub:
    desc: "Provision a stub amplify_outputs.json if none exists (offline install/typecheck/build)"
    status:
      - test -f layers/amplify/amplify_outputs.json
    cmds:
      - cp layers/amplify/amplify_outputs.stub.json layers/amplify/amplify_outputs.json

  amplify:sandbox:init:
    desc: "Deploy the Amplify sandbox to AWS"
    cmds:
      - task: amplify:checks
      - pnpm --filter {{.BACKEND}} run sandbox:init

  amplify:sandbox:delete:
    desc: "Delete the Amplify sandbox in AWS"
    cmds:
      - task: amplify:checks
      - pnpm --filter {{.BACKEND}} run sandbox:delete -y

  amplify:sandbox:secrets:
    desc: "Set the Amplify sandbox secrets (e.g. STRIPE_SECRET_KEY)"
    preconditions:
      - sh: 'test -n "$STRIPE_SECRET_KEY"'
        msg: "STRIPE_SECRET_KEY is not set (add it to .env or export it)"
    cmds:
      - task: amplify:checks
      - pnpm --filter {{.BACKEND}} run sandbox:secrets

  amplify:sandbox:generate:
    desc: "Generate Amplify outputs and the GraphQL client code"
    cmds:
      - task: amplify:checks
      - pnpm --filter {{.BACKEND}} run sandbox:generate-outputs
      - pnpm --filter {{.BACKEND}} run sandbox:generate-graphql-client-code

  amplify:sandbox:seed:
    desc: "Seed the Amplify sandbox (base data + plans + users)"
    cmds:
      - task: amplify:checks
      - pnpm --filter {{.BACKEND}} run seed
      - pnpm --filter {{.BACKEND}} run seed:plans
      - pnpm --filter {{.BACKEND}} run seed:users

  # ── billing: Stripe operations ─────────────────────────────────────────────

  billing:stripe:login:
    desc: "Authenticate the Stripe CLI"
    cmds:
      - stripe login

  billing:stripe:listen:
    desc: "Forward Stripe events to the stripe-webhook Lambda for local testing"
    cmds:
      - pnpm --filter {{.BACKEND}} run stripe:listen

  billing:stripe:seed:
    desc: "Create the Stripe products/prices fixtures in your Stripe test account"
    cmds:
      - pnpm --filter {{.BACKEND}} run sandbox:stripe:seed -- amplify/seed/data/stripe.json

  # ── clean: reset the working tree (flat meta namespace) ────────────────────

  clean:
    desc: "Clean the entire project of all temporary files"
    cmds:
      - task: clean:nuxt
      - task: clean:amplify
      - task: clean:test
      - task: clean:logs
      - task: clean:node

  clean:nuxt:
    desc: "Clean Nuxt build artifacts (.nuxt, .output, dist, .playground)"
    silent: true
    cmds:
      - find . -type d \( -name ".nuxt" -o -name ".playground" -o -name ".output" -o -name "dist" \) -exec rm -rf {} +

  clean:amplify:
    desc: "Clean Amplify generated files (preserves the committed *.stub.json)"
    silent: true
    cmds:
      - find . -type d \( -name ".amplify" \) -exec rm -rf {} +
      - find . -type f -name "amplify_outputs*" ! -name "*.stub.json" -exec rm -rf {} +
      - find . -type d \( -name "amplifyconfiguration*" \) -exec rm -rf {} +
      - find . -type d \( -name "utils/graphql*" \) -exec rm -rf {} +

  clean:test:
    desc: "Clean test artifacts (test-results)"
    silent: true
    cmds:
      - find . -type d \( -name "test-results" \) -exec rm -rf {} +

  clean:logs:
    desc: "Clean log files"
    silent: true
    cmds:
      - find . -type f \( -name "*.log" \) -exec rm -rf {} +

  clean:node:
    desc: "Clean node_modules"
    silent: true
    cmds:
      - find . -type d \( -name "node_modules" \) -exec rm -rf {} +
